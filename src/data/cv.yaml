  - id: "teaching"
    title: "Teaching Experience"
    kind: "timeline"
    items:
      - date: "2022"
        title: "Guest Lecturer – Genes, Evolution, and Ecology"
        org: "CWRU"
        note: "Dr. Arvid Ågren invited me to guest lecture on experimental evolution for his freshman-level biology course, “Genes, Evolution, and Ecology.” I discussed how experimental evolution emerged contemporaneously with Darwin as a direct challenge to gradualism and a complementary approach to the comparative method. I also introduced the *E. coli* Long-Term Evolution Experiment to the students and highlighted several key studies. Lastly, I presented on contingency, first in the context of human history and then its implications in the evolution of drug resistance."
      - date: "2016"
        title: "Teaching Assistant – Fundamentals of Microbiology"
        org: "MSU"
      - date: "2015"
        title: "Teaching Assistant – Advanced Microbiology Laboratory"
        org: "MSU"

