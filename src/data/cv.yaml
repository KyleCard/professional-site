    items:
      - date: "2026 – Present"
        title: "Rare Neurological Disorder Foundation (RNDF) Advisory Board Member"
        body: "As a member of the Clinical & Neuroscience Council, I provide strategic insights, sector expertise, and governance guidance during RNDF’s redevelopment and national expansion. We advise on organizational structure, program development, fellowship curriculum refinement, national partnership strategy, governance standards, and ethical oversight."
      - date: "2023 – Present"
        title: "Scientific Officer for Rise Up: Northeast Ohio"
        body: "I evaluate high school student proposals and develop experiments for in-class research projects."
      - date: "2021"
        title: "Experimental Evolution Session Chair and Moderator"
        org: "Evolution Conference"
      - date: "2019 – 2020"
        title: "Diversity, Equity, and Inclusion Task Force Member"
        org: "American Society for Microbiology (ASM)"
        body: "I was a member of a blue-ribbon Task Force with the charge to elevate and embody inclusive diversity with equity within the ASM. To this end, we comprehensively reviewed current policies and procedures to identify deficiencies within the Society that hinder DEI efforts; contracted and worked with a third-party DEI consultant – the Kaleidoscope Group – to develop a Member Perception Survey; and advanced guiding principles and vision statements to direct future work and activities, along with codifying benchmarks for success. We reported our findings and recommendations in a report presented to the Board of Directors. The full report may be found [here](https://asm.org/reports/diversity,-equity-and-inclusion-taskforce-report)."
      - date: "2019 – 2020"
        title: "Member of the Select Group for Graduate Curriculum Redesign"
        body: "Participated in the strategic planning process for the Microbiology & Molecular Genetics Department at Michigan State University, focusing on curriculum redesign. The committee members and I advocated for a shift away from a curriculum focused on teaching facts to one that emphasizes critical thinking, the nature, practice, and philosophy of science, and epistemological thinking. We met with department leaders to discuss introducing a new course, modeled after the R3 Initiative at Johns Hopkins. My colleague, Dr. Zachary Blount, now leads this initiative as the Director of Graduate Education Innovation."
