# The Card Lab — climbers on the expedition.
# To add a member: append an entry below (keep `order` ascending), drop a square
# photo in assets/team/ (or leave `photo` blank for a contour-marker placeholder),
# and write a bio. `*text*` renders italic (species names). Roles group the ridge.
members:
  - order: 1
    name: "Justin Creary"
    role: "Ph.D. Student"
    org: "CWRU"
    photo: "justin_creary.jpeg"
    bio: "Justin is investigating how prior evolutionary history under varying antibiotic concentrations affects the ability of pathogens to evolve resistance to clinically relevant second-line drugs."

  - order: 2
    name: "Shiva Ayyar"
    role: "Master's Student"
    org: "CWRU"
    photo: "shiva_ayyar.jpeg"
    bio: "Shiva is applying a 'coupon collector' framework to genomic data from our PNAS *S. aureus* study, exploring how idiosyncratic epistasis — where a mutation's effect depends on specific prior mutations, not just overall fitness — shapes how much of the adaptive landscape a population explores."

  - order: 3
    name: "Josh Nworie"
    role: "Postbaccalaureate"
    org: ""
    photo: "josh_nworie.jpg"
    bio: "Josh is examining how the Collateral Response Score (CRS) — derived in our PNAS study — changes across different clinical backgrounds and environmental contexts."

  - order: 4
    name: "Amira Stocks"
    role: "Undergraduate"
    org: "CWRU"
    photo: "amira_stocks.jpeg"
    bio: "Amira is investigating the impact of biofilm formation on the evolutionary trajectories of antibiotic resistance and how these pathways differ across varying backgrounds and drug concentrations."

  - order: 5
    name: "Brandon Kakuda"
    role: "Undergraduate"
    org: "CWRU"
    photo: "brandon_kakuda.png"
    bio: "Brandon is asking how selection strength and background impact the evolution of antibiotic resistance and subsequent drug tradeoffs."

  - order: 6
    name: "Rohan Desai"
    role: "Undergraduate"
    org: "Vanderbilt"
    photo: "rohan_desai.jpeg"
    bio: "Rohan is working remotely with our group to write the analysis pipeline for several projects."

  - order: 7
    name: "Drew Sager"
    role: "Undergraduate"
    org: "University of Notre Dame"
    photo: "drew_sager.jpg"
    bio: "Drew is a visiting summer student working with the team performing antibiotic time-kill assays and experimental evolution."

  - order: 8
    name: "Aryan Agarwal"
    role: "High School Student"
    org: ""
    photo: "aryan_agarwal.jpeg"
    bio: "Aryan is using genomic data from our PNAS *S. aureus* study to derive a 'heterogeneity score,' and assessing whether this metric correlates with particular drug tradeoffs."
